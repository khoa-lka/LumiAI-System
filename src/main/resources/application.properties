# =========================================================
# 1. CẤU HÌNH KẾT NỐI DATABASE SQL SERVER
# =========================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=cinema_db1;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345

# Sử dụng Driver chính chủ Microsoft SQL Server
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =========================================================
# 2. CẤU HÌNH HIBERNATE / JPA (BỘ ĐIỀU KHIỂN ĐỔI CODE SANG SQL)
# =========================================================
# Chọn phương thức giao tiếp đúng với dòng SQL Server
spring.jpa.properties.spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Để "none" vì thầy trò mình đã tạo bảng bằng tay rất xịn rồi, không muốn Spring tự sửa bậy
spring.jpa.hibernate.ddl-auto=none

# Bật cái này bằng true để mỗi lần Spring Boot truy vấn, nó sẽ in câu lệnh SQL ra bảng Console cho em dễ dò lỗi
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================================================
# 3. CẤU HÌNH CỔNG CHẠY SERVER BACKEND
# =========================================================
server.port=8080